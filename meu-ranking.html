<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Ranking — Indique e Ganhe | Polaris Energia Solar</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#011D2E;--navy-deep:#000A14;--navy-mid:#012840;
  --green:#3B8B3B;--green-light:#4CAF50;--green-bright:#56D656;--green-glow:rgba(59,139,59,.18);
  --gold:#F5A623;--gold-light:#FFD777;--gold-glow:rgba(245,166,35,.14);
  --red:#E53E3E;--blue:#4299E1;
  --white:#FFF;--gray-100:#E8EDF2;--gray-200:#C0C9D4;--gray-400:#7A8A9A;--gray-600:#3A4A5A;
  --radius:20px;--radius-sm:12px;
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--navy-deep);color:var(--gray-100);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ═══ AURORA BG ═══ */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none}
.al{position:absolute;border-radius:50%;filter:blur(140px)}
.al1{width:800px;height:800px;top:-25%;right:-15%;background:radial-gradient(circle,rgba(59,139,59,.45),transparent 70%);animation:f1 22s ease-in-out infinite;opacity:.5}
.al2{width:600px;height:600px;bottom:-15%;left:-10%;background:radial-gradient(circle,rgba(245,166,35,.3),transparent 70%);animation:f2 28s ease-in-out infinite;opacity:.5}
.al3{width:400px;height:400px;top:50%;left:40%;background:radial-gradient(circle,rgba(1,40,64,.6),transparent 70%);animation:f3 30s ease-in-out infinite;opacity:.6}
@keyframes f1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-100px,70px) scale(1.15)}}
@keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,-100px) scale(1.2)}}
@keyframes f3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.3)}}

.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.page{position:relative;z-index:2;max-width:520px;margin:0 auto;padding:0 20px;min-height:100vh;display:flex;flex-direction:column}

/* ═══ TOPBAR ═══ */
.topbar{
  padding:18px 0;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:24px;
}
.topbar-logo{height:28px}
.topbar-tri{font-size:.75rem;color:var(--gray-400);font-weight:600}
.topbar-tri strong{color:var(--gold)}

/* ═══ LOGIN SCREEN ═══ */
.login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 0}
.login-icon{font-size:4rem;margin-bottom:20px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.login-title{font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:8px;letter-spacing:-.02em}
.login-desc{font-size:.9rem;color:var(--gray-400);margin-bottom:32px;line-height:1.6}
.login-input{
  width:100%;max-width:320px;padding:14px 20px;
  background:rgba(1,40,64,.5);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);
  color:var(--white);font-family:'Outfit',sans-serif;font-size:1rem;
  text-align:center;outline:none;transition:border-color .3s ease;
  margin-bottom:16px;
}
.login-input:focus{border-color:var(--green)}
.login-input::placeholder{color:var(--gray-400)}
.login-btn{
  width:100%;max-width:320px;padding:14px 24px;
  background:var(--green);color:var(--white);border:none;
  border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;
  font-weight:700;font-size:1rem;cursor:pointer;
  transition:all .3s ease;
}
.login-btn:hover{background:var(--green-light);transform:translateY(-2px);box-shadow:0 12px 40px var(--green-glow)}
.login-error{color:var(--red);font-size:.85rem;margin-top:12px;display:none}

/* ═══ DASHBOARD (after login) ═══ */
.dash{display:none;flex:1;padding-bottom:32px}
.dash.active{display:block}
.login-screen.hidden{display:none}

/* Welcome */
.welcome{
  text-align:center;padding:28px 0 20px;
}
.welcome-hi{font-size:.85rem;color:var(--gray-400);margin-bottom:4px}
.welcome-name{font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:6px}
.welcome-code{font-size:.75rem;color:var(--gray-400);letter-spacing:.1em}

/* ═══ MY SCORE CARD ═══ */
.score-card{
  background:linear-gradient(145deg,rgba(1,40,64,.6),rgba(0,15,24,.5));
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);
  padding:32px 28px;margin-bottom:20px;text-align:center;
  position:relative;overflow:hidden;
}
.score-card::before{
  content:'';position:absolute;inset:-1px;border-radius:calc(var(--radius) + 1px);
  background:linear-gradient(135deg,var(--green),transparent 40%,transparent 60%,var(--gold));
  z-index:-2;opacity:.3;
}
.score-card::after{
  content:'';position:absolute;inset:0;border-radius:var(--radius);
  background:linear-gradient(145deg,rgba(1,40,64,.95),rgba(0,10,20,.9));z-index:-1;
}

.score-position{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 18px;border-radius:100px;
  font-size:.78rem;font-weight:700;margin-bottom:16px;
}
.pos-top3{background:var(--gold-glow);color:var(--gold);border:1px solid rgba(245,166,35,.25)}
.pos-other{background:rgba(255,255,255,.05);color:var(--gray-200);border:1px solid rgba(255,255,255,.08)}

.score-pts{
  font-family:'Sora',sans-serif;font-size:4.5rem;font-weight:900;
  line-height:1;margin-bottom:4px;
  background:linear-gradient(135deg,var(--green-bright),var(--gold-light));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.score-label{font-size:.85rem;color:var(--gray-400);margin-bottom:20px}

/* Progress to next prize */
.progress-wrap{margin-top:8px}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:.78rem}
.progress-current{color:var(--gray-200);font-weight:600}
.progress-target{color:var(--gold);font-weight:700}
.progress-bar{
  height:8px;border-radius:100px;background:rgba(255,255,255,.06);
  overflow:hidden;position:relative;
}
.progress-fill{
  height:100%;border-radius:100px;
  background:linear-gradient(90deg,var(--green),var(--green-bright));
  transition:width 1.2s cubic-bezier(.16,1,.3,1);
  position:relative;
}
.progress-fill::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:20px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3));
  border-radius:100px;
}

/* Rewards earned */
.score-rewards{
  display:flex;gap:8px;justify-content:center;margin-top:20px;flex-wrap:wrap;
}
.score-rw{
  padding:6px 14px;border-radius:100px;font-size:.72rem;font-weight:700;
  display:flex;align-items:center;gap:5px;
}
.rw-earned{background:var(--green-glow);color:var(--green-bright);border:1px solid rgba(59,139,59,.2)}
.rw-pending{background:rgba(255,255,255,.04);color:var(--gray-400);border:1px solid rgba(255,255,255,.06)}

/* ═══ MOTIVATION BANNER ═══ */
.motivation{
  background:linear-gradient(135deg,rgba(59,139,59,.12),rgba(245,166,35,.08));
  border:1px solid rgba(59,139,59,.15);border-radius:var(--radius-sm);
  padding:20px 24px;margin-bottom:20px;
  display:flex;align-items:center;gap:14px;
}
.motiv-icon{font-size:1.8rem;flex-shrink:0;animation:float 2.5s ease-in-out infinite}
.motiv-text{font-size:.9rem;line-height:1.6}
.motiv-text strong{color:var(--green-bright)}
.motiv-text .gold{color:var(--gold)}

/* ═══ PRIZE MAP ═══ */
.prizes-card{
  background:rgba(1,40,64,.4);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);
  padding:24px;margin-bottom:20px;overflow:hidden;
}
.prizes-title{
  font-family:'Sora',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:20px;
  display:flex;align-items:center;gap:8px;
}

.prize-row{
  display:flex;align-items:center;gap:14px;padding:16px;
  border-radius:var(--radius-sm);margin-bottom:8px;
  transition:all .3s ease;position:relative;
}
.prize-row:last-child{margin-bottom:0}
.prize-row.earned{background:rgba(59,139,59,.08);border:1px solid rgba(59,139,59,.15)}
.prize-row.next{background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.15);animation:pulseGlow 3s ease-in-out infinite}
.prize-row.locked{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);opacity:.6}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,0)}50%{box-shadow:0 0 20px rgba(245,166,35,.08)}}

.prize-medal{font-size:2rem;flex-shrink:0}
.prize-info{flex:1}
.prize-place{font-family:'Sora',sans-serif;font-size:.85rem;font-weight:700}
.prize-val{font-family:'Sora',sans-serif;font-size:1.3rem;font-weight:800;margin:2px 0}
.prize-row.earned .prize-val{color:var(--green-bright)}
.prize-row.next .prize-val{color:var(--gold)}
.prize-row.locked .prize-val{color:var(--gray-400)}
.prize-desc{font-size:.75rem;color:var(--gray-400)}

.prize-status{
  padding:5px 12px;border-radius:100px;font-size:.7rem;font-weight:700;
  white-space:nowrap;flex-shrink:0;
}
.ps-earned{background:var(--green-glow);color:var(--green-bright)}
.ps-next{background:var(--gold-glow);color:var(--gold)}
.ps-locked{background:rgba(255,255,255,.04);color:var(--gray-400)}

/* ═══ PIX SUMMARY ═══ */
.pix-card{
  background:linear-gradient(145deg,rgba(59,139,59,.1),rgba(1,40,64,.4));
  backdrop-filter:blur(16px);
  border:1px solid rgba(59,139,59,.12);border-radius:var(--radius);
  padding:24px;margin-bottom:20px;
  display:grid;grid-template-columns:1fr 1fr;gap:16px;
}
.pix-item{text-align:center}
.pix-item-val{font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:800;color:var(--green-bright)}
.pix-item-label{font-size:.72rem;color:var(--gray-400);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}

/* ═══ RANKING TABLE ═══ */
.rank-card{
  background:rgba(1,40,64,.4);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);
  padding:24px;margin-bottom:20px;overflow:hidden;
}
.rank-title{
  font-family:'Sora',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}

.rank-list{list-style:none}
.rank-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-radius:var(--radius-sm);margin-bottom:4px;transition:background .2s ease;
}
.rank-item:hover{background:rgba(255,255,255,.02)}
.rank-item.me{background:rgba(59,139,59,.08);border:1px solid rgba(59,139,59,.15)}

.rank-pos{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-size:.75rem;font-weight:800;flex-shrink:0;
}
.rp-1{background:linear-gradient(135deg,#F5A623,#FFD777);color:var(--navy)}
.rp-2{background:linear-gradient(135deg,#CBD5E0,#F0F0F0);color:var(--navy)}
.rp-3{background:linear-gradient(135deg,#CD7F32,#E8A862);color:var(--navy)}
.rp-x{background:rgba(255,255,255,.05);color:var(--gray-400)}

.rank-name{flex:1;font-weight:600;font-size:.9rem}
.rank-name .me-tag{
  font-size:.65rem;padding:2px 8px;border-radius:100px;
  background:var(--green-glow);color:var(--green-bright);
  margin-left:6px;font-weight:700;vertical-align:middle;
}
.rank-pts{
  font-family:'Sora',sans-serif;font-weight:800;font-size:.9rem;
  color:var(--gray-200);
}
.rank-item.me .rank-pts{color:var(--green-bright)}

/* ═══ COUNTDOWN ═══ */
.countdown{
  background:rgba(1,40,64,.4);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);
  padding:24px;margin-bottom:20px;text-align:center;
}
.cd-title{font-size:.8rem;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.cd-nums{display:flex;justify-content:center;gap:12px}
.cd-block{
  background:rgba(0,0,0,.2);border-radius:var(--radius-sm);
  padding:12px 16px;min-width:64px;
}
.cd-val{font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:800;color:var(--gold)}
.cd-unit{font-size:.65rem;color:var(--gray-400);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}

/* ═══ CTA ═══ */
.cta-bottom{
  background:linear-gradient(145deg,rgba(1,40,64,.5),rgba(0,10,20,.3));
  border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);
  padding:28px 24px;text-align:center;margin-bottom:20px;
}
.cta-bottom h3{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:8px}
.cta-bottom p{font-size:.85rem;color:var(--gray-400);margin-bottom:20px;line-height:1.6}
.cta-wa{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 32px;background:var(--green);color:var(--white);
  text-decoration:none;font-weight:700;font-size:.95rem;border-radius:100px;
  transition:all .3s ease;box-shadow:0 0 40px var(--green-glow);
}
.cta-wa:hover{background:var(--green-light);transform:translateY(-2px);box-shadow:0 16px 60px var(--green-glow)}

/* Footer */
.ft{text-align:center;padding:20px 0;border-top:1px solid rgba(255,255,255,.04);margin-top:auto}
.ft-text{font-size:.7rem;color:var(--gray-600)}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--gray-400);font-size:.85rem}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.08);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* Animations */
.fadeIn{animation:fadeIn .6s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.d1{animation-delay:.1s;opacity:0}.d2{animation-delay:.2s;opacity:0}.d3{animation-delay:.3s;opacity:0}
.d4{animation-delay:.4s;opacity:0}.d5{animation-delay:.5s;opacity:0}.d6{animation-delay:.6s;opacity:0}
.d7{animation-delay:.7s;opacity:0}
</style>
</head>

<script>
const PX='https://api.codetabs.com/v1/proxy?quest=';
// SHEET CONFIG — replace with your published sheet ID
const SHEET_ID='1tWuk6IA5rnFfx8C6Bxg4Migwa0KSrzsXWEDCkV7NiZY';
let allInd=[],allRef=[],me=null,myCode='',ranking=[];

function gCSV(gid){return`${PX}https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`}

function getCurrentTrimestre(){
  const m=new Date().getMonth(),y=new Date().getFullYear();
  if(m<3)return`T1 ${y}`;if(m<6)return`T2 ${y}`;if(m<9)return`T3 ${y}`;return`T4 ${y}`;
}
const TRI=getCurrentTrimestre();

function getTriEnd(){
  const y=parseInt(TRI.split(' ')[1]),q=parseInt(TRI[1]);
  return new Date(y, q*3, 0, 23, 59, 59);
}

async function doLogin(){
  const input=document.getElementById('loginInput').value.trim();
  if(!input){return}
  document.getElementById('loginError').style.display='none';

  try{
    if(_preloadedInd && _preloadedRef){
      allInd=_preloadedInd; allRef=_preloadedRef;
    } else {
      const[c1,c2]=await Promise.all([fetch(gCSV('790120450')).then(r=>r.text()),fetch(gCSV('1124389417')).then(r=>r.text())]);
      allInd=Papa.parse(c1,{header:true,skipEmptyLines:true}).data;
      allRef=Papa.parse(c2,{header:true,skipEmptyLines:true}).data;
    }

    // Find user by code or phone
    const clean=input.replace(/\D/g,'');
    me=allInd.find(r=>{
      const code=(r['Código']||'').toUpperCase();
      const phone=(r['Telefone']||'').replace(/\D/g,'');
      return code===input.toUpperCase() || phone===clean || phone.endsWith(clean);
    });

    if(!me){document.getElementById('loginError').style.display='block';return}
    myCode=(me['Código']||'').toUpperCase();

    // Build ranking
    const triRefs=allRef.filter(r=>(r['Trimestre']||'').includes(TRI)&&(r['Status']||'').toLowerCase()==='convertida');
    const pts={};
    triRefs.forEach(r=>{
      const c=(r['Código Indicador']||'').toUpperCase();
      const n=r['Nome Indicador']||c;
      if(!pts[c])pts[c]={code:c,name:n,points:0};
      pts[c].points++;
    });
    ranking=Object.values(pts).sort((a,b)=>b.points-a.points);

    // Show dashboard
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dash').classList.add('active');
    document.getElementById('triLabel').textContent=TRI;
    renderDashboard();
  }catch(e){
    document.getElementById('loginError').textContent='Erro ao carregar dados. Tente novamente.';
    document.getElementById('loginError').style.display='block';
  }
}

function renderDashboard(){
  renderWelcome();
  renderScore();
  renderMotivation();
  renderPix();
  renderPrizes();
  renderRanking();
  renderCountdown();
}

function renderWelcome(){
  const name=(me['Nome Completo']||'Participante').split(' ')[0];
  document.getElementById('welcomeArea').innerHTML=`
    <div class="welcome-hi">Olá,</div>
    <div class="welcome-name">${name} 👋</div>
    <div class="welcome-code">${myCode}</div>`;
}

function renderScore(){
  const myRank=ranking.find(r=>r.code===myCode);
  const pts=myRank?myRank.points:0;
  const pos=myRank?ranking.indexOf(myRank)+1:ranking.length+1;
  const isTop3=pos<=3&&pts>=2;

  // Progress to next milestone
  const leader=ranking.length?ranking[0].points:0;
  const ptsToFirst=Math.max(0,leader-pts+(pos===1?0:1));
  const minQualify=2;
  const ptsToQualify=Math.max(0,minQualify-pts);
  const progressPct=pts>=leader&&leader>0?100:leader>0?Math.min((pts/leader)*100,100):0;

  let progressLabel='',progressTarget='';
  if(pts<minQualify){
    progressLabel=`${pts}/${minQualify} para qualificar`;
    progressTarget='Mínimo 2 pts';
  }else if(pos>3){
    const third=ranking.length>=3?ranking[2].points:0;
    progressLabel=`Faltam ${Math.max(0,third-pts+1)} pts`;
    progressTarget='Top 3';
  }else if(pos>1){
    progressLabel=`Faltam ${ptsToFirst} pts`;
    progressTarget='1º lugar';
  }else{
    progressLabel='Você lidera!';
    progressTarget='🏆';
  }

  const posEmoji=pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':'🏅';
  const posClass=isTop3?'pos-top3':'pos-other';
  const posText=isTop3?`${posEmoji} ${pos}º lugar — qualificado!`:`${posEmoji} ${pos}º lugar`;

  const earnedPix=pts*200;

  document.getElementById('scoreCard').innerHTML=`
    <div class="score-position ${posClass}">${posText}</div>
    <div class="score-pts">${pts}</div>
    <div class="score-label">pontos no trimestre</div>
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="progress-current">${progressLabel}</span>
        <span class="progress-target">${progressTarget}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progressPct}%"></div>
      </div>
    </div>
    <div class="score-rewards">
      ${pts>0?`<span class="score-rw rw-earned">💰 R$ ${earnedPix.toLocaleString('pt-BR')} PIX acumulado</span>`:''}
      ${isTop3?`<span class="score-rw rw-earned">🏆 Prêmio ranking</span>`:`<span class="score-rw rw-pending">🏆 Continue indicando</span>`}
    </div>`;
}

function renderMotivation(){
  const myRank=ranking.find(r=>r.code===myCode);
  const pts=myRank?myRank.points:0;
  const pos=myRank?ranking.indexOf(myRank)+1:ranking.length+1;

  let icon='🚀',msg='';
  if(pts===0){
    icon='✨';msg='Faça sua primeira indicação e comece a acumular pontos! Cada contrato fechado = <strong>R$200 PIX</strong> + 1 ponto no ranking.';
  }else if(pts<2){
    icon='🔥';msg=`Falta apenas <strong>${2-pts} indicação</strong> convertida para você se qualificar ao ranking trimestral! Continue assim.`;
  }else if(pos>3){
    const third=ranking.length>=3?ranking[2].points:0;
    const diff=third-pts+1;
    if(diff<=2){
      icon='⚡';msg=`Você está a apenas <strong>${diff} ${diff===1?'indicação':'indicações'}</strong> do <span class="gold">Top 3</span> e dos prêmios! O pódio está ao seu alcance.`;
    }else{
      icon='💪';msg=`Você já tem <strong>${pts} pontos</strong> e <strong>R$ ${(pts*200).toLocaleString('pt-BR')}</strong> em PIX acumulados! Continue indicando para subir no ranking.`;
    }
  }else if(pos===1){
    icon='👑';msg='Você está <strong>liderando o ranking</strong>! Mantenha o ritmo e garanta o prêmio de <span class="gold">R$1.500</span>.';
  }else{
    const first=ranking[0].points;
    const diff=first-pts+1;
    icon='🎯';msg=`Você está no <strong>${pos}º lugar</strong>! Faltam <strong>${diff} ${diff===1?'indicação':'indicações'}</strong> para alcançar o 1º lugar.`;
  }

  document.getElementById('motivArea').innerHTML=`<div class="motiv-icon">${icon}</div><div class="motiv-text">${msg}</div>`;
}

function renderPix(){
  const myRank=ranking.find(r=>r.code===myCode);
  const pts=myRank?myRank.points:0;
  const myRefs=allRef.filter(r=>(r['Código Indicador']||'').toUpperCase()===myCode&&(r['Trimestre']||'').includes(TRI));
  const total=myRefs.length;
  const converted=myRefs.filter(r=>(r['Status']||'').toLowerCase()==='convertida').length;

  document.getElementById('pixArea').innerHTML=`
    <div class="pix-item"><div class="pix-item-val">R$ ${(converted*200).toLocaleString('pt-BR')}</div><div class="pix-item-label">PIX acumulado</div></div>
    <div class="pix-item"><div class="pix-item-val">${total}</div><div class="pix-item-label">Indicações feitas</div></div>`;
}

function renderPrizes(){
  const myRank=ranking.find(r=>r.code===myCode);
  const pts=myRank?myRank.points:0;
  const pos=myRank?ranking.indexOf(myRank)+1:999;

  const prizes=[
    {medal:'🥇',place:'1º Lugar',val:'R$ 1.500',desc:'Campeão do trimestre',pos:1},
    {medal:'🥈',place:'2º Lugar',val:'R$ 1.000',desc:'Vice-campeão',pos:2},
    {medal:'🥉',place:'3º Lugar',val:'R$ 500',desc:'Terceiro colocado',pos:3},
  ];

  let html=`<div class="prizes-title">🎁 Prêmios do Trimestre</div>`;
  prizes.forEach(p=>{
    let cls='locked',ps='ps-locked',psText='Em disputa';
    if(pos===p.pos&&pts>=2){cls='earned';ps='ps-earned';psText='✓ Sua posição!';}
    else if(pos<p.pos&&pts>=2){cls='earned';ps='ps-earned';psText='✓ Alcançado';}
    else if((pos===p.pos+1||(pos>3&&p.pos===3))&&pts>=1){cls='next';ps='ps-next';psText='Próximo alvo';}
    html+=`<div class="prize-row ${cls}">
      <div class="prize-medal">${p.medal}</div>
      <div class="prize-info"><div class="prize-place">${p.place}</div><div class="prize-val">${p.val}</div><div class="prize-desc">${p.desc}</div></div>
      <div class="prize-status ${ps}">${psText}</div>
    </div>`;
  });

  document.getElementById('prizesArea').innerHTML=html;
}

function renderRanking(){
  const myRank=ranking.find(r=>r.code===myCode);
  const myPos=myRank?ranking.indexOf(myRank)+1:null;
  const isInRanking=!!myRank;

  let html=`<div class="rank-title">📊 Ranking Completo — ${TRI}</div><ul class="rank-list">`;

  ranking.forEach((r,i)=>{
    const pos=i+1;
    const isMe=r.code===myCode;
    const rpClass=pos===1?'rp-1':pos===2?'rp-2':pos===3?'rp-3':'rp-x';
    html+=`<li class="rank-item${isMe?' me':''}">
      <div class="rank-pos ${rpClass}">${pos}</div>
      <div class="rank-name">${r.name}${isMe?'<span class="me-tag">VOCÊ</span>':''}</div>
      <div class="rank-pts">${r.points} pts</div>
    </li>`;
  });

  if(!isInRanking){
    const name=(me['Nome Completo']||'Você').split(' ').slice(0,2).join(' ');
    html+=`<li class="rank-item me">
      <div class="rank-pos rp-x">—</div>
      <div class="rank-name">${name}<span class="me-tag">VOCÊ</span></div>
      <div class="rank-pts">0 pts</div>
    </li>`;
  }

  html+='</ul>';
  document.getElementById('rankArea').innerHTML=html;
}

function renderCountdown(){
  const end=getTriEnd();
  function update(){
    const now=new Date(),diff=end-now;
    if(diff<=0){document.getElementById('cdArea').innerHTML='<div class="cd-title">Trimestre encerrado</div>';return}
    const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
    document.getElementById('cdArea').innerHTML=`
      <div class="cd-title">Fim do trimestre em</div>
      <div class="cd-nums">
        <div class="cd-block"><div class="cd-val">${d}</div><div class="cd-unit">Dias</div></div>
        <div class="cd-block"><div class="cd-val">${h}</div><div class="cd-unit">Horas</div></div>
        <div class="cd-block"><div class="cd-val">${m}</div><div class="cd-unit">Min</div></div>
      </div>`;
  }
  update();setInterval(update,60000);
}

// URL param auto-login
// Pré-carrega CSVs em background ao abrir a página
let _preloadedInd=null, _preloadedRef=null;
async function preloadCSV(){
  try{
    const[c1,c2]=await Promise.all([
      fetch(gCSV('790120450')).then(r=>r.text()),
      fetch(gCSV('1124389417')).then(r=>r.text())
    ]);
    _preloadedInd=Papa.parse(c1,{header:true,skipEmptyLines:true}).data;
    _preloadedRef=Papa.parse(c2,{header:true,skipEmptyLines:true}).data;
  }catch(e){console.warn('Pré-carregamento falhou:',e)}
}

window.addEventListener('DOMContentLoaded',()=>{
  preloadCSV(); // inicia em background imediatamente
  const p=new URLSearchParams(window.location.search);
  const code=p.get('code')||p.get('tel')||p.get('c');
  if(code){document.getElementById('loginInput').value=code;doLogin()}
});
</script>
